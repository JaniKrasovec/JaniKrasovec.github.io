url: "https://janikrasovec.github.io"   # ← add this (helps asset resolution on GH Pages)
baseurl: ""                             # ← empty string for user/organization sites

remote_theme: mmistakes/minimal-mistakes@4.28.0

plugins:
  - jekyll-sitemap
  - jekyll-include-cache

title: Jani Krašovec
description: Personal website, notes, and links

minimal_mistakes_skin: default

author:
  name: "Jani Krašovec"
  avatar: "/assets/images/jani.jpg"     # change to "/assets/images/jani.JPG" if you don't rename the file
  bio: "Born on summer of sixtynine..."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/JaniKrasovec"

header:
  overlay_image: /assets/images/header-bg.jpg
  overlay_filter: 0.5
  caption: "Stay on this road"

defaults:
  - scope:
      path: ""
    values:
      layout: splash
